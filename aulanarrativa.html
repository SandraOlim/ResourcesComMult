<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulas - Narrativa Visual Interativa II</title>
    <style>
        :root { --bg: #f8f9fc; --white: #ffffff; --primary: #6e5ce6; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        
        .back-link { text-decoration: none; color: #636e72; font-size: 0.9rem; margin-bottom: 20px; display: block; }
        
        h1 { font-size: 2rem; margin-bottom: 30px; }

        /* Estilo da Lista de Recursos */
        .resource-list { display: flex; flex-direction: column; gap: 15px; }
        
        .resource-item {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .resource-info { display: flex; align-items: center; gap: 15px; }
        .file-icon { font-size: 24px; background: #f0f2ff; padding: 10px; border-radius: 10px; }

        .btn-download {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-download:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <a href="narrativasvisuais.html" class="back-link">← Voltar para a Disciplina</a>
    
    <h1>📚 Materiais das Aulas</h1>

    <div class="resource-list">
        
        <div class="resource-item">
            <div class="resource-info">
                <span class="file-icon">📄</span>
                <div>
                    <strong>Slides das aulas</strong>
                    <p style="margin: 5px 0 0; font-size: 0.85rem; color: #636e72;">PDF • 2.4 MB</p>
                </div>
            </div>
            <a href="visualnarrative.pdf" class="btn-download" target="_blank">Ver PDF</a>
        </div>

        <div class="resource-item">
            <div class="resource-info">
                <span class="file-icon">📄</span>
                <div>
                    <strong>Programa</strong>
                    <p style="margin: 5px 0 0; font-size: 0.85rem; color: #636e72;">Vídeo Aula • 15 min</p>
                </div>
            </div>
            <a href="programa_conteudosIVN.pdf" class="btn-download" target="_blank">View Program</a>
    

    </div>
</div>

</body>
</html>
