<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutoriais - Narrativas Visuais</title>
    <style>
        :root {
            --bg-color: #f8f9fc;
            --white: #ffffff;
            --primary-purple: #6e5ce6;
            --text-main: #1e272e;
            --text-secondary: #636e72;
            --accent-bg: #f0f2ff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; }
        .back-link { text-decoration: none; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; display: block; }

        /* Estilo do Cabeçalho igual à imagem */
        header { margin-bottom: 40px; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        
        /* BOTÕES DE SELEÇÃO (TABS) */
        .tabs-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 25px;
            border: none;
            background-color: var(--white);
            color: var(--text-secondary);
            border-radius: 50px; /* Estilo pílula, muito moderno */
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .tab-button.active {
            background-color: var(--primary-purple);
            color: var(--white);
        }

        /* CONTEÚDO DOS TUTORIAIS */
        .tutorial-content { display: none; animation: fadeIn 0.5s; }
        .tutorial-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-card {
            background: var(--white);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .section-title {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            color: #b2bec3;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .resource-link {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--accent-bg);
            border-radius: 12px;
            text-decoration: none;
            color: var(--primary-purple);
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="narrativasvisuais.html" class="back-link">← Voltar</a>

        <header>
            <h1>Materiais de Apoio</h1>
            <p style="color: var(--text-secondary);"></p>
        </header>

        <div class="tabs-container">
            <button class="tab-button active" onclick="openTutorial(event, 'tutorial1')">Twine</button>
            <button class="tab-button" onclick="openTutorial(event, 'tutorial2')">Figma</button>
            </div>

        <div id="tutorial1" class="tutorial-content active">
            <div class="content-card">
                <p class="section-title">Twine</p>
                <div class="video-box">
    <video width="100%" height="100%" controls style="border-radius: 15px;">
        <source src="twine.mp4" type="video/mp4">
        <div style="padding: 40px; text-align: center; background: var(--accent-bg); height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <p style="color: var(--text-secondary);">O seu navegador não consegue reproduzir este vídeo diretamente.</p>
            <a href="twine.mp4" target="_blank" class="resource-link" style="background: var(--primary-purple); color: white;">
                ▶️ Clique aqui para abrir o vídeo em tela cheia
            </a>
        </div>
    </video>
</div>
                <a href="twineiniciante.pdf" class="resource-link">📥 Baixar Tutorial para Iniciante Twine (pdf)</a>
                </a>

        <a href="englishtutorial.pdf" class="resource-link" style="margin-top: 10px;">
            <span>📥</span>
            <span style="margin-left: 10px;">Download Tutorial for Twine Begginers Users (PDF)</span>
        </a>
            </div>
        </div>

        <div id="tutorial2" class="tutorial-content">
            <div class="content-card">
                <p class="section-title">Figma</p>
                <div class="video-box">
                    <video width="100%" height="100%" controls style="border-radius: 15px;">
        <source src="Figma.mp4" type="video/mp4">
        <div style="padding: 40px; text-align: center; background: var(--accent-bg); height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <p style="color: var(--text-secondary);">O seu navegador não consegue reproduzir este vídeo diretamente.</p>
            <a href="Figma.mp4" target="_blank" class="resource-link" style="background: var(--primary-purple); color: white;">
                ▶️ Clique aqui para abrir o vídeo em tela cheia
              </a>
        </div>
    </video>
</div>

                <a href="figma.pdf" class="resource-link">📥 Baixar o Tutorial: Figma para iniciantes</a>
                <a href="figmablueprint.pdf" class="resource-link" style="margin-top: 10px;">
            <span>📥</span>
            <span style="margin-left: 10px;">Blue print do programa Figma</span>
        </a>
            </div>
        </div>

    </div>

    <script>
        function openTutorial(evt, tutorialName) {
            var i, content, tabs;
            
            // Esconde todos os conteúdos
            content = document.getElementsByClassName("tutorial-content");
            for (i = 0; i < content.length; i++) {
                content[i].classList.remove("active");
            }

            // Remove a classe "active" de todos os botões
            tabs = document.getElementsByClassName("tab-button");
            for (i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }

            // Mostra o conteúdo atual e adiciona classe ativa ao botão
            document.getElementById(tutorialName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>

</body>
</html>
